<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script type="text/javascript" src="https://qz.io/download/qz-tray.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/11.1.0/jsrsasign-all-min.js"></script>
</head>
<body>
<script>
(function () {
  const payload = window.__QZ_PAYLOAD__;

  function sign(toSign, privateKeyPem) {
    const pk = KEYUTIL.getKey(privateKeyPem);
    const sig = new KJUR.crypto.Signature({ alg: 'SHA256withRSA' });
    sig.init(pk);
    sig.updateString(toSign);
    return sig.sign();
  }

  function fail(msg, err) {
    console.error('[QZ]', msg, err || '');
    try {
      window.parent.postMessage({ source: 'qz_print', ok: false, message: msg, error: (err && (err.message || String(err))) || null }, '*');
    } catch (e) {}
  }

  async function run() {
    if (!payload) {
      fail('Missing payload');
      return;
    }

    if (!payload.cert || !payload.privateKey) {
      fail('Missing certificate or private key');
      return;
    }

    qz.security.setCertificatePromise(function (resolve, reject) {
      resolve(payload.cert);
    });

    qz.security.setSignaturePromise(function (toSign) {
      return function (resolve, reject) {
        try {
          resolve(sign(toSign, payload.privateKey));
        } catch (e) {
          reject(e);
        }
      };
    });

    try {
      await qz.websocket.connect();

      let printer = payload.printerName;
      if (!printer) {
        const printers = await qz.printers.find();
        printer = printers && printers[0];
      }

      if (!printer) {
        fail('No printer found');
        return;
      }

      const cfg = qz.configs.create(printer);

      const data = (payload.jobs || []).map(function (cmd) {
        return { type: 'raw', format: 'command', data: cmd };
      });

      if (!data.length) {
        fail('No TSPL jobs');
        return;
      }

      await qz.print(cfg, data);

      try {
        window.parent.postMessage({ source: 'qz_print', ok: true, printer: printer, jobCount: data.length }, '*');
      } catch (e) {}

    } catch (e) {
      fail('QZ print failed', e);
    } finally {
      try { await qz.websocket.disconnect(); } catch (e) {}
    }
  }

  run();
})();
</script>
</body>
</html>
